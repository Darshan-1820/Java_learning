<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice IDE | Nimbus Java Core</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #1e1e1e;
      --bg-secondary: #252526;
      --bg-card: #2d2d2d;
      --bg-card-hover: #333333;
      --bg-surface: #1b1b1b;
      --text-primary: #e8e8e8;
      --text-secondary: #a0a0a0;
      --text-muted: #6b6b6b;
      --accent: #1ba94c;
      --accent-hover: #149140;
      --accent-glow: rgba(27, 169, 76, 0.12);
      --green: #1ba94c;
      --green-light: #2ec866;
      --orange: #f5a623;
      --purple: #a855f7;
      --red: #e74c3c;
      --cyan: #06b6d4;
      --blue: #4a90d9;
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.15);
      --radius: 4px;
      --radius-lg: 6px;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ===== HEADER (HackerRank style) ===== */
    .header {
      background: #0b141e;
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 20px; }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo svg { width: 26px; height: 26px; }
    .logo-text { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 1rem; color: var(--text-primary); }
    .logo-divider { width: 1px; height: 24px; background: var(--border-strong); }
    .header-title { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); }
    .header-right { display: flex; gap: 8px; align-items: center; }
    .header-link { color: var(--text-secondary); text-decoration: none; font-size: 0.78rem; font-weight: 500; padding: 5px 10px; border-radius: 4px; transition: all 0.2s; }
    .header-link:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
    .header-link.active { color: var(--green); }
    .api-status { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--text-muted); padding: 4px 10px; border-radius: 4px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); cursor: pointer; }
    .api-status .dot { width: 6px; height: 6px; border-radius: 50%; }
    .api-status .dot.connected { background: var(--green); }
    .api-status .dot.disconnected { background: var(--red); }
    .api-status .dot.unknown { background: var(--orange); }

    /* ===== IDE LAYOUT ===== */
    .ide-container {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(340px, 2fr) minmax(420px, 3fr);
      overflow: hidden;
    }

    /* ===== LEFT PANEL: PROBLEM ===== */
    .problem-panel {
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-strong);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .problem-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
      flex-shrink: 0;
    }
    .problem-tab {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      padding: 12px 20px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      background: none;
      border-top: none; border-left: none; border-right: none;
    }
    .problem-tab:hover { color: var(--text-secondary); }
    .problem-tab.active { color: var(--green); border-bottom-color: var(--green); }

    .problem-toolbar {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      background: var(--bg-surface);
    }
    .question-select {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 7px 12px;
      border-radius: 4px;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%23a0a0a0' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 10px center;
      padding-right: 28px;
    }
    .question-select option { background: var(--bg-card); color: var(--text-primary); }
    .difficulty-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    .difficulty-badge.major { background: rgba(231, 76, 60, 0.12); color: var(--red); border: 1px solid rgba(231,76,60,0.2); }
    .difficulty-badge.minor { background: rgba(27, 169, 76, 0.12); color: var(--green); border: 1px solid rgba(27,169,76,0.2); }

    .problem-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .problem-body::-webkit-scrollbar { width: 6px; }
    .problem-body::-webkit-scrollbar-track { background: transparent; }
    .problem-body::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }

    .problem-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text-primary);
    }
    .problem-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 20px;
    }
    .problem-desc p { margin-bottom: 10px; }
    .problem-desc strong { color: var(--text-primary); }
    .problem-desc code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8em;
      background: rgba(0,0,0,0.4);
      padding: 2px 6px;
      border-radius: 3px;
      color: var(--green-light);
    }
    .problem-desc ul, .problem-desc ol { padding-left: 20px; margin: 8px 0; }
    .problem-desc li { margin-bottom: 4px; }
    .problem-desc pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      background: rgba(0,0,0,0.3);
      padding: 10px 14px;
      border-radius: 4px;
      color: var(--text-secondary);
      overflow-x: auto;
      margin: 8px 0;
    }

    .sample-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin: 20px 0 10px;
    }
    .sample-case {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .sample-case-header {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-muted);
      padding: 8px 12px;
      background: rgba(0,0,0,0.25);
      border-bottom: 1px solid var(--border);
    }
    .sample-case-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .sample-col { padding: 10px 12px; }
    .sample-col:first-child { border-right: 1px solid var(--border); }
    .sample-col-label {
      font-size: 0.62rem;
      font-weight: 700;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .sample-col pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.76rem;
      color: var(--text-secondary);
      white-space: pre;
      line-height: 1.5;
      margin: 0;
    }

    /* ===== RIGHT PANEL ===== */
    .right-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== EDITOR TOOLBAR ===== */
    .editor-toolbar {
      padding: 6px 16px;
      background: #0b141e;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .editor-toolbar-left { display: flex; align-items: center; gap: 12px; }
    .lang-selector {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 4px;
      outline: none;
      cursor: default;
    }
    .editor-file-tab {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .editor-file-tab .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
    .editor-toolbar-right { display: flex; gap: 8px; align-items: center; }
    .timer-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      min-width: 55px;
      text-align: center;
    }
    .timer-display.running { color: var(--orange); }
    .timer-display.danger { color: var(--red); animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .timer-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }
    .timer-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }

    /* ===== EDITOR ===== */
    .editor-area {
      flex: 1;
      min-height: 0;
      position: relative;
    }
    #editor-container { width: 100%; height: 100%; }

    /* ===== OUTPUT PANEL ===== */
    .output-panel {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-strong);
      display: flex;
      flex-direction: column;
      height: 260px;
      min-height: 120px;
      flex-shrink: 0;
    }
    .output-tabs-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
      flex-shrink: 0;
      padding-right: 12px;
    }
    .output-tabs { display: flex; }
    .output-tab {
      font-size: 0.76rem;
      font-weight: 600;
      color: var(--text-muted);
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      background: none;
      border-top: none; border-left: none; border-right: none;
    }
    .output-tab:hover { color: var(--text-secondary); }
    .output-tab.active { color: var(--green); border-bottom-color: var(--green); }
    .output-tab .count {
      font-size: 0.65rem;
      padding: 1px 6px;
      border-radius: 10px;
      margin-left: 6px;
      font-weight: 700;
    }
    .output-tab .count.pass { background: rgba(27, 169, 76, 0.15); color: var(--green); }
    .output-tab .count.fail { background: rgba(231, 76, 60, 0.15); color: var(--red); }
    .output-expand-btn {
      font-size: 0.7rem;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }
    .output-expand-btn:hover { color: var(--text-primary); }

    .output-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }
    .output-content::-webkit-scrollbar { width: 6px; }
    .output-content::-webkit-scrollbar-track { background: transparent; }
    .output-content::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* Console */
    .console-output {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--text-secondary);
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.6;
    }
    .console-output.error { color: var(--red); }
    .console-placeholder {
      color: var(--text-muted);
      font-size: 0.8rem;
      font-style: italic;
    }

    /* Custom Input */
    .custom-input-area {
      width: 100%;
      min-height: 80px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      padding: 10px 12px;
      resize: vertical;
      outline: none;
      line-height: 1.5;
    }
    .custom-input-area:focus { border-color: var(--green); }
    .custom-input-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .custom-input-toggle {
      font-size: 0.68rem;
      color: var(--blue);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
    }

    /* Test results */
    .test-result {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .test-result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .test-result-header:hover { background: var(--bg-card-hover); }
    .test-result-left { display: flex; align-items: center; gap: 8px; }
    .test-status-icon {
      width: 20px; height: 20px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .test-status-icon.pass { background: rgba(27, 169, 76, 0.15); color: var(--green); }
    .test-status-icon.fail { background: rgba(231, 76, 60, 0.15); color: var(--red); }
    .test-status-icon svg { width: 11px; height: 11px; }
    .test-result-name { font-size: 0.8rem; font-weight: 600; color: var(--text-primary); }
    .test-result-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem; font-weight: 600;
      color: var(--text-muted);
      padding: 2px 7px;
      background: rgba(0,0,0,0.3);
      border-radius: 3px;
    }
    .test-result-detail {
      display: none;
      padding: 0 12px 10px;
      border-top: 1px solid var(--border);
    }
    .test-result.open .test-result-detail { display: block; }
    .test-diff {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .test-diff-col {
      background: var(--bg-surface);
      border-radius: 4px;
      padding: 8px 10px;
      overflow-x: auto;
    }
    .test-diff-label { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .test-diff-label.expected { color: var(--green); }
    .test-diff-label.actual { color: var(--red); }
    .test-diff-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-secondary);
      white-space: pre;
      line-height: 1.5;
    }

    /* Score bar */
    .score-section { margin-bottom: 14px; }
    .score-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
    .score-text { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.95rem; font-weight: 700; }
    .score-fraction { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-muted); }
    .score-bar-track { height: 6px; background: var(--bg-card); border-radius: 3px; overflow: hidden; }
    .score-bar-fill {
      height: 100%; border-radius: 3px;
      transition: width 0.5s ease, background 0.3s;
      width: 0%;
    }
    .score-bar-fill.full { background: var(--green); }
    .score-bar-fill.partial { background: var(--orange); }
    .score-bar-fill.none { background: var(--red); }

    /* ===== BOTTOM ACTION BAR (HackerRank style) ===== */
    .action-bar {
      background: #0b141e;
      border-top: 1px solid var(--border);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .action-left { display: flex; align-items: center; gap: 12px; }
    .action-center { display: flex; align-items: center; gap: 10px; }
    .action-right { display: flex; align-items: center; gap: 12px; }

    .btn-run {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: transparent;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 4px;
      border: 1px solid var(--border-strong);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-run:hover { background: rgba(255,255,255,0.05); border-color: var(--text-secondary); }
    .btn-run:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-run svg { width: 12px; height: 12px; }

    .btn-submit {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--green);
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 8px 22px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-submit:hover { background: var(--accent-hover); }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-submit svg { width: 13px; height: 13px; }

    .btn-reset {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.76rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-reset:hover { color: var(--text-primary); background: rgba(255,255,255,0.04); }
    .btn-reset svg { width: 12px; height: 12px; }

    .status-indicator {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); }
    .status-dot.ready { background: var(--green); }
    .status-dot.running { background: var(--orange); animation: pulse 0.8s infinite; }
    .status-dot.done { background: var(--blue); }
    .status-dot.error { background: var(--red); }

    .question-counter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .shortcut-hint {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: var(--text-muted);
      background: rgba(255,255,255,0.04);
      padding: 3px 7px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }
    .elapsed-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .elapsed-display svg { width: 12px; height: 12px; opacity: 0.6; }

    /* ===== ATTEMPT HISTORY ===== */
    .history-section { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
    .history-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem; font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .history-table { width: 100%; border-collapse: collapse; font-size: 0.76rem; }
    .history-table th {
      text-align: left; padding: 5px 8px;
      color: var(--text-muted); font-weight: 600;
      font-size: 0.65rem; text-transform: uppercase;
      letter-spacing: 0.5px; border-bottom: 1px solid var(--border);
    }
    .history-table td { padding: 5px 8px; color: var(--text-secondary); border-bottom: 1px solid rgba(255,255,255,0.03); }
    .history-table tr:last-child td { border-bottom: none; }
    .history-table tr.best td { color: var(--green); font-weight: 600; }
    .score-pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; font-weight: 700;
      padding: 2px 7px; border-radius: 3px;
      display: inline-block;
    }
    .score-pill.full { background: rgba(27,169,76,0.15); color: var(--green); }
    .score-pill.partial { background: rgba(245,166,35,0.15); color: var(--orange); }
    .score-pill.zero { background: rgba(231,76,60,0.15); color: var(--red); }
    .no-history { font-size: 0.76rem; color: var(--text-muted); font-style: italic; }


    /* ===== SPINNER ===== */
    .spinner {
      display: inline-block; width: 12px; height: 12px;

let editor = null;
let currentQuestion = 0;
let timerInterval = null;
let timerSeconds = 0;

let elapsedInterval = null;
let elapsedSeconds = 0;
let elapsedStarted = false;

// ============================================================

// ============================================================
function showApiModal() { /* no-op — credentials are server-side now */ }
function closeApiModal() { }

function updateApiStatus() {
  const dot = document.getElementById('apiDot');
  const label = document.getElementById('apiLabel');
  dot.className = 'dot connected';
  label.textContent = 'JDoodle Ready';
}

// ============================================================
//  INIT
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  updateApiStatus();

  // Populate dropdown
  const select = document.getElementById('questionSelect');
  QUESTIONS.forEach((q, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${i + 1}. ${q.title} (${q.difficulty === 'major' ? 'Major' : 'Minor'} - ${q.timeMinutes}min)`;
    select.appendChild(opt);
  });
  select.addEventListener('change', (e) => {
    currentQuestion = parseInt(e.target.value);
    loadQuestion();
  });

  // Init Monaco
  require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' }});
  require(['vs/editor/editor.main'], function () {
    editor = monaco.editor.create(document.getElementById('editor-container'), {
      value: getSavedCode(0) || QUESTIONS[0].starterCode,
      language: 'java',
      theme: 'vs-dark',
      fontSize: 14,
      fontFamily: "'JetBrains Mono', monospace",
      minimap: { enabled: false },
      scrollBeyondLastLine: false,
      automaticLayout: true,
      tabSize: 4,
      padding: { top: 14 },
      renderLineHighlight: 'gutter',
      smoothScrolling: true,
      cursorBlinking: 'smooth',
      cursorSmoothCaretAnimation: 'on',
      bracketPairColorization: { enabled: true },
      wordWrap: 'off',
      lineNumbersMinChars: 3,
    });

    // Ctrl+Enter = Run, Ctrl+Shift+Enter = Submit
    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, () => runCode());
    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyMod.Shift | monaco.KeyCode.Enter, () => submitCode());

    editor.onDidChangeModelContent(() => {
      saveCode(currentQuestion, editor.getValue());
      if (!elapsedStarted) startElapsed();
    });

    loadQuestion();
  });

  initResize();

  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      if (e.shiftKey) submitCode();
      else runCode();
    }
  });
});

function loadQuestion() {
  const q = QUESTIONS[currentQuestion];

  // Difficulty badge
  const badge = document.getElementById('diffBadge');
  badge.textContent = q.difficulty === 'major' ? `Major · ${q.timeMinutes}min` : `Minor · ${q.timeMinutes}min`;
  badge.className = `difficulty-badge ${q.difficulty}`;

  // Problem body
  let html = `<div class="problem-title">${q.title}</div>`;
  html += `<div class="problem-desc">${q.description}</div>`;

  // Sample test cases
  const visibleTests = q.testCases.filter(tc => !tc.hidden);
  if (visibleTests.length > 0) {
    html += `<div class="sample-label">Sample Test Cases</div>`;
    visibleTests.forEach((tc) => {
      html += `
        <div class="sample-case">
          <div class="sample-case-header">${tc.name}</div>
          <div class="sample-case-grid">
            <div class="sample-col">
              <div class="sample-col-label">Input</div>
              <pre>${escapeHtml(tc.input.replace(/\\n/g, '\n'))}</pre>
            </div>
            <div class="sample-col">
              <div class="sample-col-label">Expected Output</div>
              <pre>${escapeHtml(tc.expected.replace(/\\n/g, '\n'))}</pre>
            </div>
          </div>
        </div>`;
    });
  }

  const hiddenCount = q.testCases.filter(tc => tc.hidden).length;
  if (hiddenCount > 0) {
    html += `<div style="margin-top:10px; font-size:0.76rem; color:var(--text-muted); font-style:italic;">+ ${hiddenCount} hidden test case${hiddenCount > 1 ? 's' : ''}</div>`;
  }

  document.getElementById('problemPane').innerHTML = html;

  // Editor code
  if (editor) {
    const saved = getSavedCode(currentQuestion);
    editor.setValue(saved || q.starterCode);
  }

  // Counter
  document.getElementById('questionCounter').textContent = `Q${currentQuestion + 1} / ${QUESTIONS.length}`;

  // Load first sample input into custom input
  if (visibleTests.length > 0) {
    document.getElementById('customInput').value = visibleTests[0].input.replace(/\\n/g, '\n');
  }

  // Reset output
  resetOutput();
  resetTimer();
  resetElapsed();
}

function renderSubmissions() {
  const history = getHistory(currentQuestion);
  if (history.length === 0) {
    document.getElementById('submissionsPane').innerHTML = '<div class="no-history" style="padding:20px;">No submissions yet. Write your code and click Submit.</div>';
    return;
  }
  let html = `<div style="padding:10px 0;"><table class="history-table">
    <tr><th>#</th><th>Score</th><th>Time</th><th>Date</th></tr>`;
  history.slice().reverse().forEach((h, i) => {
    const pillClass = h.score === 100 ? 'full' : h.score > 0 ? 'partial' : 'zero';
    const dateStr = new Date(h.date).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });

      <td>${formatElapsed(h.timeTaken)}</td>

// ============================================================
//  CODE EXECUTION (via Netlify Function → JDoodle)
// ============================================================
async function executeCode(code, input) {
  const res = await fetch('/.netlify/functions/execute', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ script: code, stdin: input })
  });

  if (!res.ok) {
    const errText = await res.text();
    throw new Error(`Server error (${res.status}): ${errText.substring(0, 200)}`);
  }

  const data = await res.json();
  if (data.error) throw new Error(data.error);

  const output = data.output || '';
  const isCompileError = output.includes('error:') && (data.statusCode === 200 || !data.statusCode);
  const isRuntimeError = data.statusCode && data.statusCode !== 200 && !isCompileError;

  return {
    stdout: isCompileError || isRuntimeError ? '' : output,
    stderr: isRuntimeError ? output : '',
    compile_output: isCompileError ? output : '',
    time: data.cpuTime,
    memory: data.memory
  };
}

async function runCode() {
  if (!editor) return;

  const code = editor.getValue();
  const input = document.getElementById('customInput').value;
  const runBtn = document.getElementById('runBtn');

  runBtn.disabled = true;
  runBtn.innerHTML = '<span class="spinner"></span> Running...';
  setStatus('running', 'Compiling...');

  try {
    const result = await executeCode(code, input);
    switchTab('output', document.querySelector('[data-tab="output"]'));
    const outputPane = document.getElementById('outputPane');

    if (result.compile_output) {
      outputPane.innerHTML = `<pre class="console-output error">${escapeHtml(result.compile_output)}</pre>`;
      setStatus('error', 'Compilation Error');
    } else if (result.stderr) {
      outputPane.innerHTML = `<pre class="console-output error">${escapeHtml(result.stderr)}</pre>`;
      setStatus('error', 'Runtime Error');
    } else {
      const out = result.stdout || '(no output)';
      outputPane.innerHTML = `<pre class="console-output">${escapeHtml(out)}</pre>`;
      setStatus('done', `Executed (${result.time || '?'}s CPU)`);
    }
  } catch (err) {
    document.getElementById('outputPane').innerHTML = `<pre class="console-output error">Error: ${escapeHtml(err.message)}</pre>`;
    setStatus('error', 'API Error');
    switchTab('output', document.querySelector('[data-tab="output"]'));
  }

  runBtn.disabled = false;
  runBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Run Code';
}

async function submitCode() {
  if (!editor) return;

  const code = editor.getValue();
  const q = QUESTIONS[currentQuestion];
  const submitBtn = document.getElementById('submitBtn');

  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner"></span> Testing...';
  setStatus('running', 'Running test cases...');

  const startTime = performance.now();
  const results = [];

  for (let i = 0; i < q.testCases.length; i++) {
    const tc = q.testCases[i];
    const input = tc.input.replace(/\\n/g, '\n');
    try {
      const result = await executeCode(code, input);
      const actualOutput = result.stdout || '';
      const expected = tc.expected.replace(/\\n/g, '\n');
      const passed = compareOutput(actualOutput, expected);

      results.push({
        testCase: tc, index: i, passed,
        output: actualOutput,
        error: result.compile_output || result.stderr || '',
        time: result.time
      });
    } catch (err) {
      results.push({
        testCase: tc, index: i, passed: false,
        output: '', error: 'API Error: ' + err.message, time: null
      });
    }
  }

  const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
  renderTestResults(results);

  const passCount = results.filter(r => r.passed).length;
  if (passCount === results.length) {
    setStatus('done', `All ${results.length} passed in ${elapsed}s`);
  } else {
    setStatus('error', `${passCount}/${results.length} passed in ${elapsed}s`);
  }

  submitBtn.disabled = false;
  submitBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l5 5L20 7"/></svg> Submit';
}

function compareOutput(actual, expected) {
  const a = actual.trim().split('\n').map(l => l.trim());
  const e = expected.trim().split('\n').map(l => l.trim());
  if (a.length !== e.length) return false;
  return a.every((line, i) => line === e[i]);
}

// ============================================================
//  RENDER TEST RESULTS
// ============================================================
function renderTestResults(results) {
  const pane = document.getElementById('resultsPane');
  const passCount = results.filter(r => r.passed).length;
  const total = results.length;

  stopElapsed();
  const timeTaken = elapsedSeconds;
  saveAttempt(currentQuestion, passCount, total, timeTaken);

  let html = `
    <div class="score-section">
      <div class="score-header">
        <span class="score-text" style="color: ${passCount === total ? 'var(--green)' : passCount > 0 ? 'var(--orange)' : 'var(--red)'}">
          ${passCount === total ? 'All Passed!' : `${passCount}/${total} Passed`}
        </span>
        <span class="score-fraction">${passCount} of ${total} — ${formatElapsed(timeTaken)}</span>
      </div>
      <div class="score-bar-track">
        <div class="score-bar-fill ${passCount === total ? 'full' : passCount > 0 ? 'partial' : 'none'}" style="width: ${(passCount / total) * 100}%"></div>
      </div>
    </div>`;

  results.forEach((r) => {
    const statusClass = r.passed ? 'pass' : 'fail';
    const checkSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>';
    const xSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>';
    const expected = r.testCase.expected.replace(/\\n/g, '\n');

    html += `
      <div class="test-result${!r.passed ? ' open' : ''}" onclick="this.classList.toggle('open')">
        <div class="test-result-header">
          <div class="test-result-left">
            <div class="test-status-icon ${statusClass}">${r.passed ? checkSvg : xSvg}</div>
            <span class="test-result-name">${r.testCase.name}</span>
          </div>
          ${r.testCase.hidden ? '<span class="test-result-tag">Hidden</span>' : ''}
        </div>
        <div class="test-result-detail">
          ${!r.passed ? `
            <div class="test-diff">
              <div class="test-diff-col">
                <div class="test-diff-label expected">Expected</div>
                <pre class="test-diff-code">${escapeHtml(expected)}</pre>
              </div>
              <div class="test-diff-col">
                <div class="test-diff-label actual">Your Output</div>
                <pre class="test-diff-code">${escapeHtml(r.output.trim() || r.error || '(no output)')}</pre>
              </div>
            </div>` : `
            <div style="padding:6px 0; color:var(--green); font-size:0.8rem;">Output matches expected.</div>`}
        </div>
      </div>`;
  });

  pane.innerHTML = html;

  // Update tab badge
  const countEl = document.getElementById('testCount');
  countEl.style.display = 'inline';
  countEl.textContent = `${passCount}/${total}`;
  countEl.className = `count ${passCount === total ? 'pass' : 'fail'}`;

  // Switch to results tab
  switchTab('results', document.querySelector('[data-tab="results"]'));
  resetElapsed();
}

  document.getElementById('outputPane').innerHTML = '<div class="console-placeholder">Run your code to see output here...</div>';
  document.getElementById('resultsPane').innerHTML = '<div class="console-placeholder">Submit your code to see test results...</div>';

// ============================================================
//  LOCAL STORAGE
// ============================================================
function getSavedCode(qi) { try { return localStorage.getItem(`nimbus-ide-q${qi}`); } catch { return null; } }
function saveCode(qi, code) { try { localStorage.setItem(`nimbus-ide-q${qi}`, code); } catch {} }

// ============================================================
//  TIMER
// ============================================================
function toggleTimer() {
  if (timerRunning) pauseTimer();
  else startTimer();
}
function startTimer() {
  const q = QUESTIONS[currentQuestion];
  if (timerSeconds === 0) timerSeconds = q.timeMinutes * 60;
  timerRunning = true;
  document.getElementById('timerBtn').textContent = 'Pause';
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      timerRunning = false;
      document.getElementById('timerBtn').textContent = 'Reset';
      document.getElementById('timerDisplay').classList.add('danger');
    }
  }, 1000);
}
function pauseTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  document.getElementById('timerBtn').textContent = 'Resume';
}
function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSeconds = 0;
  const d = document.getElementById('timerDisplay');
  d.textContent = '--:--';
  d.className = 'timer-display';
  document.getElementById('timerBtn').textContent = 'Timer';
}
function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  const d = document.getElementById('timerDisplay');
  d.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  d.className = timerSeconds <= 300 ? 'timer-display danger' : 'timer-display running';
}

// ============================================================
//  ELAPSED TIME
// ============================================================
function startElapsed() {
  if (elapsedStarted) return;
  elapsedStarted = true;
  elapsedSeconds = 0;
  elapsedInterval = setInterval(() => { elapsedSeconds++; updateElapsedDisplay(); }, 1000);
}
function stopElapsed() { clearInterval(elapsedInterval); }
function resetElapsed() {
  clearInterval(elapsedInterval);
  elapsedStarted = false;
  elapsedSeconds = 0;
  updateElapsedDisplay();
}
function updateElapsedDisplay() {
  const m = Math.floor(elapsedSeconds / 60);
  const s = elapsedSeconds % 60;
  document.getElementById('elapsedTime').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function formatElapsed(t) {
  const m = Math.floor(t / 60), s = t % 60;
  return m === 0 ? `${s}s` : `${m}m ${s}s`;
}

//  ATTEMPT HISTORY
// ============================================================
function getHistory(qi) { try { const d = localStorage.getItem(`nimbus-ide-history-q${qi}`); return d ? JSON.parse(d) : []; } catch { return []; } }
function saveAttempt(qi, passed, total, timeTaken) {
  const history = getHistory(qi);
  history.push({ date: new Date().toISOString(), passed, total, timeTaken, score: Math.round((passed / total) * 100) });
  if (history.length > 20) history.splice(0, history.length - 20);
  try { localStorage.setItem(`nimbus-ide-history-q${qi}`, JSON.stringify(history)); } catch {}
}

// ============================================================
//  RESIZE
// ============================================================
function initResize() {
  const handle = document.getElementById('resizeHandle');
  const panel = document.getElementById('outputPanel');
  let startY, startH;
  handle.addEventListener('mousedown', (e) => {
    startY = e.clientY; startH = panel.offsetHeight;
    document.addEventListener('mousemove', onR);
    document.addEventListener('mouseup', stopR);
    document.body.style.cursor = 'ns-resize';
    document.body.style.userSelect = 'none';
  });
  function onR(e) { panel.style.height = Math.max(120, Math.min(600, startH + (startY - e.clientY))) + 'px'; }
  function stopR() { document.removeEventListener('mousemove', onR); document.removeEventListener('mouseup', stopR); document.body.style.cursor = ''; document.body.style.userSelect = ''; }
}

// ============================================================
//  UTILITY

function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
