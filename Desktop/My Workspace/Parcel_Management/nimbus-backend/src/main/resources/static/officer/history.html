<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nimbus — Officer Booking History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

  <div class="main-content">

    <div class="page-header">
      <h1>Booking History</h1>
      <p>Search all bookings by Customer ID and date range.</p>
    </div>

    <div class="content-card">

      <!-- Filters -->
      <div class="search-bar" style="flex-wrap: wrap;">
        <input type="text" class="form-input" id="filterCustomerId" placeholder="Customer ID" style="flex: 1; min-width: 150px;">
        <input type="date" class="form-input" id="filterStartDate" style="flex: 0 0 auto; width: 170px;">
        <input type="date" class="form-input" id="filterEndDate" style="flex: 0 0 auto; width: 170px;">
        <button class="btn btn-primary" onclick="applyFilter()">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Search
        </button>
        <button class="btn btn-outline" onclick="clearFilter()">Clear</button>
      </div>

      <!-- Results Table -->
      <div style="overflow-x: auto;">
        <table class="data-table" id="historyTable">
          <thead>
            <tr>
              <th>Customer ID</th>
              <th>Booking ID</th>
              <th>Booking Date</th>
              <th>Receiver Name</th>
              <th>Delivered Address</th>
              <th>Amount</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="pagination" id="pagination">
        <button id="btnPrev" onclick="prevPage()" disabled>Previous</button>
        <span class="page-info" id="pageInfo">Page 1</span>
        <button id="btnNext" onclick="nextPage()">Next</button>
      </div>

    </div>
  </div>

  <!-- Scripts -->
  <script src="../js/storage.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/navbar.js"></script>
  <script>
    // Auth guard
    const session = NimbusAuth.requireAuth(['officer']);
    if (!session) throw new Error('Unauthorized');

    NimbusNav.render('Booking History', 'history.html');

    const PAGE_SIZE = 5;
    let currentPage = 1;
    let filteredBookings = [];

    function getStatusClass(status) {
      const map = {
        'Booked': 'booked',
        'In Transit': 'in-transit',
        'Delivered': 'delivered',
        'Returned': 'returned',
        'Picked Up': 'picked-up'
      };
      return map[status] || 'booked';
    }

    function renderPage() {
      const tbody = document.getElementById('historyBody');
      const start = (currentPage - 1) * PAGE_SIZE;
      const pageData = filteredBookings.slice(start, start + PAGE_SIZE);
      const totalPages = Math.max(1, Math.ceil(filteredBookings.length / PAGE_SIZE));

      if (pageData.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="7">No bookings found for the given criteria.</td></tr>';
      } else {
        tbody.innerHTML = pageData.map(b => {
          const date = new Date(b.createdAt).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
          return `<tr>
            <td style="font-family: monospace; font-size: 0.8125rem;">${b.userId}</td>
            <td style="font-family: monospace; font-weight: 600; color: var(--nimbus-secondary);">${b.bookingId}</td>
            <td style="white-space: nowrap;">${date}</td>
            <td>${b.recName}</td>
            <td style="max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${b.recAddress}</td>
            <td style="font-weight: 600;">Rs. ${b.parServiceCost}</td>
            <td><span class="status-badge ${getStatusClass(b.parStatus)}">${b.parStatus}</span></td>
          </tr>`;
        }).join('');
      }

      // Update pagination
      document.getElementById('pageInfo').textContent = 'Page ' + currentPage + ' of ' + totalPages;
      document.getElementById('btnPrev').disabled = currentPage <= 1;
      document.getElementById('btnNext').disabled = currentPage >= totalPages;
    }

    function applyFilter() {
      const custId = document.getElementById('filterCustomerId').value.trim();
      const startDate = document.getElementById('filterStartDate').value;
      const endDate = document.getElementById('filterEndDate').value;

      filteredBookings = NimbusDB.getBookingsByDateRange(custId || null, startDate || null, endDate || null);
      currentPage = 1;
      renderPage();
    }

    function clearFilter() {
      document.getElementById('filterCustomerId').value = '';
      document.getElementById('filterStartDate').value = '';
      document.getElementById('filterEndDate').value = '';
      loadAll();
    }

    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        renderPage();
      }
    }

    function nextPage() {
      const totalPages = Math.ceil(filteredBookings.length / PAGE_SIZE);
      if (currentPage < totalPages) {
        currentPage++;
        renderPage();
      }
    }

    function loadAll() {
      filteredBookings = NimbusDB.getBookings().sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      currentPage = 1;
      renderPage();
    }

    // Initial load
    loadAll();
  </script>

</body>
</html>
