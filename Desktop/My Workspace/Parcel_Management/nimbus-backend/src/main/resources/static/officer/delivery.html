<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nimbus — Delivery Status</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

  <div class="main-content">

    <div class="page-header">
      <h1>Delivery Status Update</h1>
      <p>Search a booking and update its delivery status.</p>
    </div>

    <div class="content-card">
      <h2>Search Booking</h2>

      <div class="search-bar">
        <input type="text" id="searchBookingId" class="form-input" placeholder="Enter Booking ID (e.g. NMB-260401-0001)">
        <button class="btn btn-primary" onclick="searchBooking()">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Search
        </button>
      </div>

      <div id="alertBox" class="alert" style="display: none;"></div>

      <!-- Booking Details -->
      <div id="bookingDetails" style="display: none;">
        <h2>Booking Details</h2>

        <table class="data-table">
          <tbody>
            <tr><td style="font-weight: 600; width: 200px;">Booking ID</td><td id="detBookingId"></td></tr>
            <tr><td style="font-weight: 600;">Customer Name</td><td id="detCustomerName"></td></tr>
            <tr><td style="font-weight: 600;">Customer Address</td><td id="detCustomerAddress"></td></tr>
            <tr><td style="font-weight: 600;">Receiver Name</td><td id="detReceiverName"></td></tr>
            <tr><td style="font-weight: 600;">Receiver Address</td><td id="detReceiverAddress"></td></tr>
            <tr><td style="font-weight: 600;">Date of Booking</td><td id="detBookingDate"></td></tr>
            <tr><td style="font-weight: 600;">Current Status</td><td id="detStatus"></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Status Update Form -->
    <div id="updateForm" class="content-card" style="display: none;">
      <h2>Update Status</h2>

      <div class="form-group">
        <label class="form-label" for="newStatus">New Status *</label>
        <select id="newStatus" class="form-input">
          <option value="">-- Select Status --</option>
          <option value="Booked">Booked</option>
          <option value="Picked up">Picked up</option>
          <option value="In Transit">In Transit</option>
          <option value="Delivered">Delivered</option>
          <option value="Returned">Returned</option>
        </select>
        <div class="form-error" id="statusError">Please select a status.</div>
      </div>

      <div id="updateAlert" class="alert" style="display: none;"></div>

      <button class="btn btn-primary btn-lg" onclick="updateStatus()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Update Status
      </button>
    </div>

  </div>

  <script src="../js/storage.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/navbar.js"></script>
  <script>
    const session = NimbusAuth.requireAuth(['officer']);
    if (!session) throw new Error('Unauthorized');

    NimbusNav.render('Delivery Status', 'delivery.html');

    let currentBooking = null;

    function showAlert(id, message, type) {
      const el = document.getElementById(id);
      el.className = 'alert ' + type;
      el.textContent = message;
      el.style.display = 'flex';
    }

    function hideAlert(id) {
      document.getElementById(id).style.display = 'none';
    }

    function formatDateTime(iso) {
      if (!iso) return 'N/A';
      const d = new Date(iso);
      return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) + ', ' +
             d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
    }

    function getStatusClass(status) {
      const map = { 'Booked': 'booked', 'Picked up': 'picked-up', 'In Transit': 'in-transit', 'Delivered': 'delivered', 'Returned': 'returned' };
      return map[status] || 'booked';
    }

    function searchBooking() {
      const bookingId = document.getElementById('searchBookingId').value.trim();
      hideAlert('alertBox');
      document.getElementById('bookingDetails').style.display = 'none';
      document.getElementById('updateForm').style.display = 'none';
      currentBooking = null;

      if (!bookingId) {
        showAlert('alertBox', 'Please enter a Booking ID.', 'warning');
        return;
      }

      const booking = NimbusDB.getBookingById(bookingId);
      if (!booking) {
        showAlert('alertBox', 'No booking found with ID: ' + bookingId, 'error');
        return;
      }

      currentBooking = booking;
      const customer = NimbusDB.getUserById(booking.userId);
      const customerName = customer ? customer.fullName : 'Unknown';
      const customerAddress = customer ? [customer.street, customer.city, customer.state, customer.zipCode].filter(Boolean).join(', ') : 'N/A';

      document.getElementById('detBookingId').textContent = booking.bookingId;
      document.getElementById('detCustomerName').textContent = customerName;
      document.getElementById('detCustomerAddress').textContent = customerAddress;
      document.getElementById('detReceiverName').textContent = booking.recName;
      document.getElementById('detReceiverAddress').textContent = booking.recAddress;
      document.getElementById('detBookingDate').textContent = formatDateTime(booking.createdAt);
      document.getElementById('detStatus').innerHTML = '<span class="status-badge ' + getStatusClass(booking.parStatus) + '">' + booking.parStatus + '</span>';

      document.getElementById('bookingDetails').style.display = 'block';
      document.getElementById('updateForm').style.display = 'block';

      // Pre-select current status
      document.getElementById('newStatus').value = booking.parStatus;
    }

    function updateStatus() {
      hideAlert('updateAlert');
      document.getElementById('statusError').classList.remove('visible');
      document.getElementById('newStatus').classList.remove('error');

      const newStatus = document.getElementById('newStatus').value;

      if (!newStatus) {
        document.getElementById('statusError').classList.add('visible');
        document.getElementById('newStatus').classList.add('error');
        return;
      }

      const result = NimbusDB.updateBooking(currentBooking.bookingId, { parStatus: newStatus });

      if (result) {
        showAlert('updateAlert', 'Delivery status updated to ' + newStatus + '.', 'success');
        // Refresh displayed status
        document.getElementById('detStatus').innerHTML = '<span class="status-badge ' + getStatusClass(newStatus) + '">' + newStatus + '</span>';
        currentBooking.parStatus = newStatus;
      } else {
        showAlert('updateAlert', 'Failed to update status. Please try again.', 'error');
      }
    }

    // Allow Enter key in search
    document.getElementById('searchBookingId').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') searchBooking();
    });
  </script>

</body>
</html>
