<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nimbus — Invoice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

  <div class="main-content">
    <div class="content-card">

      <!-- Alert -->
      <div id="invoiceAlert" class="alert" style="display:none;"></div>

      <div class="invoice" id="invoiceContent" style="display:none;">

        <!-- Invoice Header -->
        <div class="invoice-header">
          <svg viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 140px; height: auto; margin: 0 auto var(--space-md);">
            <path d="M38 40H16a10 10 0 0 1-1.2-19.9 12 12 0 0 1 22.9-2.3A8 8 0 0 1 44 26a8 8 0 0 1-6 7.7" stroke="#1B2A4A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <path d="M30 32l6-6m0 0l-6-6m6 6H20" stroke="#2E86DE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <text x="54" y="36" font-family="Plus Jakarta Sans, sans-serif" font-weight="800" font-size="26" fill="#1B2A4A">nimbus</text>
          </svg>
          <h2 style="font-size: 1.25rem; margin-bottom: 4px;">Booking Invoice</h2>
          <p style="font-size: 0.875rem; color: var(--nimbus-text-light);" id="invoiceBookingId"></p>
        </div>

        <!-- Invoice Rows -->
        <div id="invoiceRows"></div>

        <!-- Print Button -->
        <div class="no-print" style="text-align: center; margin-top: var(--space-xl); display: flex; gap: var(--space-md); justify-content: center;">
          <button class="btn btn-outline" onclick="window.location.href='dashboard.html';">&larr; Back to Dashboard</button>
          <button class="btn btn-primary" onclick="window.print();">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            Print Invoice
          </button>
        </div>

      </div>

    </div>
  </div>

  <!-- Scripts -->
  <script src="../js/storage.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/navbar.js"></script>
  <script>
    // --- Auth guard ---
    const session = NimbusAuth.requireAuth(['customer']);
    if (session) {
      NimbusNav.render('Invoice', 'booking.html');
      loadInvoice();
    }

    function loadInvoice() {
      // Get booking ID from URL
      const params = new URLSearchParams(window.location.search);
      const bookingId = params.get('id');

      if (!bookingId) {
        showAlert('error', 'No booking ID provided. Please access this page from a valid booking.');
        return;
      }

      const booking = NimbusDB.getBookingById(bookingId);

      if (!booking) {
        showAlert('error', 'Booking not found: ' + bookingId + '. It may have been removed or the ID is incorrect.');
        return;
      }

      // Populate invoice
      document.getElementById('invoiceBookingId').textContent = booking.bookingId;
      document.getElementById('invoiceContent').style.display = 'block';

      const formatTime = (t) => {
        if (!t) return 'Not specified';
        try {
          return new Date(t).toLocaleString('en-IN', {
            dateStyle: 'medium',
            timeStyle: 'short'
          });
        } catch {
          return t;
        }
      };

      const rows = [
        ['Receiver Name', booking.recName],
        ['Receiver Address', booking.recAddress],
        ['Receiver Pin Code', booking.recPin],
        ['Receiver Mobile', booking.recMobile],
        ['divider'],
        ['Parcel Weight', booking.parWeightGram + ' grams'],
        ['Parcel Contents', booking.parContentsDescription],
        ['divider'],
        ['Delivery Type', booking.parDeliveryType],
        ['Packing Preference', booking.parPackingPreference],
        ['Pickup Time', formatTime(booking.parPickupTime)],
        ['Dropoff Time', formatTime(booking.parDropoffTime)],
        ['divider'],
        ['Payment Time', formatTime(booking.parPaymentTime)],
      ];

      let html = '';
      rows.forEach(row => {
        if (row[0] === 'divider') {
          html += '<div style="height: var(--space-sm);"></div>';
          return;
        }
        html += `<div class="invoice-row"><span class="label">${row[0]}</span><span class="value">${row[1]}</span></div>`;
      });

      // Total row
      html += `<div class="invoice-row invoice-total"><span class="label">Service Cost</span><span class="value" style="color: var(--nimbus-secondary);">Rs. ${booking.parServiceCost}</span></div>`;

      document.getElementById('invoiceRows').innerHTML = html;
    }

    function showAlert(type, message) {
      const alert = document.getElementById('invoiceAlert');
      alert.className = 'alert ' + type;
      alert.textContent = message;
      alert.style.display = 'flex';
    }
  </script>

</body>
</html>
