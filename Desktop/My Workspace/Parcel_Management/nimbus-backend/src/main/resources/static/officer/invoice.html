<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nimbus — Officer Invoice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

  <div class="main-content">

    <div class="content-card invoice" id="invoiceCard">

      <!-- Invoice Header -->
      <div class="invoice-header">
        <svg viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 140px; margin: 0 auto var(--space-md);">
          <path d="M38 40H16a10 10 0 0 1-1.2-19.9 12 12 0 0 1 22.9-2.3A8 8 0 0 1 44 26a8 8 0 0 1-6 7.7" stroke="#1B2A4A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M30 32l6-6m0 0l-6-6m6 6H20" stroke="#2E86DE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="54" y="36" font-family="Plus Jakarta Sans, sans-serif" font-weight="800" font-size="26" fill="#1B2A4A">nimbus</text>
        </svg>
        <h2 style="font-size: 1.25rem; margin-bottom: 4px;">Booking Confirmation</h2>
        <p style="color: var(--nimbus-text-light); font-size: 0.875rem;" id="invoiceDate"></p>
      </div>

      <!-- Alert -->
      <div class="alert success" style="margin-bottom: var(--space-lg);">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        Payment successful. Booking confirmed.
      </div>

      <!-- Booking ID -->
      <div style="text-align: center; margin-bottom: var(--space-xl);">
        <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--nimbus-text-light); margin-bottom: 4px;">Booking ID</div>
        <div style="font-size: 1.5rem; font-weight: 800; font-family: var(--font-display); color: var(--nimbus-secondary);" id="invoiceBookingId"></div>
      </div>

      <!-- Details -->
      <div id="invoiceBody"></div>

      <!-- Actions -->
      <div class="no-print" style="display: flex; gap: var(--space-md); justify-content: center; margin-top: var(--space-xl);">
        <button class="btn btn-primary" onclick="window.print()">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print Invoice
        </button>
        <a href="dashboard.html" class="btn btn-outline">Back to Dashboard</a>
        <a href="booking.html" class="btn btn-outline">Book Another</a>
      </div>

    </div>
  </div>

  <!-- Scripts -->
  <script src="../js/storage.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/navbar.js"></script>
  <script>
    // Auth guard
    const session = NimbusAuth.requireAuth(['officer']);
    if (!session) throw new Error('Unauthorized');

    NimbusNav.render('Invoice', 'booking.html');

    // Get booking ID from URL
    const params = new URLSearchParams(window.location.search);
    const bookingId = params.get('id');

    if (!bookingId) {
      window.location.href = 'dashboard.html';
      throw new Error('No booking ID');
    }

    const booking = NimbusDB.getBookingById(bookingId);
    if (!booking) {
      window.location.href = 'dashboard.html';
      throw new Error('Booking not found');
    }

    // Populate invoice
    document.getElementById('invoiceBookingId').textContent = booking.bookingId;
    document.getElementById('invoiceDate').textContent = new Date(booking.createdAt).toLocaleDateString('en-IN', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    // Look up sender info
    const sender = NimbusDB.getUserById(booking.userId);
    const senderName = booking.senderName || (sender ? sender.fullName : booking.userId);
    const senderContact = booking.senderContact || (sender ? sender.mobile : '-');
    const senderAddress = booking.senderAddress || (sender ? [sender.street, sender.city, sender.state, sender.zipCode].filter(Boolean).join(', ') : '-');

    document.getElementById('invoiceBody').innerHTML = `
      <h4 style="margin-bottom: var(--space-sm); color: var(--nimbus-secondary);">Sender</h4>
      <div class="invoice-row"><span class="label">Name</span><span class="value">${senderName}</span></div>
      <div class="invoice-row"><span class="label">Contact</span><span class="value">${senderContact}</span></div>
      <div class="invoice-row"><span class="label">Address</span><span class="value">${senderAddress}</span></div>

      <h4 style="margin-top: var(--space-lg); margin-bottom: var(--space-sm); color: var(--nimbus-secondary);">Receiver</h4>
      <div class="invoice-row"><span class="label">Name</span><span class="value">${booking.recName}</span></div>
      <div class="invoice-row"><span class="label">Mobile</span><span class="value">${booking.recMobile}</span></div>
      <div class="invoice-row"><span class="label">Address</span><span class="value">${booking.recAddress}</span></div>
      <div class="invoice-row"><span class="label">PIN Code</span><span class="value">${booking.recPin}</span></div>

      <h4 style="margin-top: var(--space-lg); margin-bottom: var(--space-sm); color: var(--nimbus-secondary);">Parcel Details</h4>
      <div class="invoice-row"><span class="label">Weight</span><span class="value">${booking.parWeightGram}g</span></div>
      <div class="invoice-row"><span class="label">Contents</span><span class="value">${booking.parContentsDescription}</span></div>
      <div class="invoice-row"><span class="label">Delivery Type</span><span class="value">${booking.parDeliveryType}</span></div>
      <div class="invoice-row"><span class="label">Packaging</span><span class="value">${booking.parPackingPreference}</span></div>
      <div class="invoice-row"><span class="label">Status</span><span class="value"><span class="status-badge booked">Booked</span></span></div>

      <h4 style="margin-top: var(--space-lg); margin-bottom: var(--space-sm); color: var(--nimbus-secondary);">Payment</h4>
      <div class="invoice-row"><span class="label">Method</span><span class="value" style="text-transform: capitalize;">${booking.paymentMethod}</span></div>
      <div class="invoice-row"><span class="label">Paid At</span><span class="value">${new Date(booking.parPaymentTime).toLocaleString('en-IN')}</span></div>
      <div class="invoice-row"><span class="label">Booked By (Officer)</span><span class="value">${booking.bookedBy || session.userId}</span></div>
      <div class="invoice-row invoice-total"><span class="label">Total Amount</span><span class="value">Rs. ${booking.parServiceCost}</span></div>
    `;
  </script>

</body>
</html>
