<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nimbus — Booking History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

  <div class="main-content">

    <div class="page-header">
      <h1>Booking History</h1>
      <p>All your past and current bookings in one place.</p>
    </div>

    <div class="content-card">
      <h2>Your Bookings</h2>

      <div style="overflow-x: auto;">
        <table class="data-table">
          <thead>
            <tr>
              <th>Customer ID</th>
              <th>Booking ID</th>
              <th>Booking Date</th>
              <th>Receiver Name</th>
              <th>Delivered Address</th>
              <th>Amount</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>

      <div class="pagination" id="paginationControls">
        <button id="prevBtn" disabled>Previous</button>
        <span class="page-info" id="pageInfo">Page 1 of 1</span>
        <button id="nextBtn" disabled>Next</button>
      </div>
    </div>

  </div>

  <!-- Scripts -->
  <script src="../js/storage.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/navbar.js"></script>
  <script>
    const session = NimbusAuth.requireAuth(['customer']);
    if (!session) throw new Error('Unauthorized');

    NimbusNav.render('Booking History', 'history.html');

    const ROWS_PER_PAGE = 5;
    let currentPage = 1;

    // Already sorted descending by createdAt from storage layer
    const bookings = NimbusDB.getBookingsByUser(session.userId);
    const totalPages = Math.max(1, Math.ceil(bookings.length / ROWS_PER_PAGE));

    const tbody = document.getElementById('historyBody');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const pageInfo = document.getElementById('pageInfo');

    function getStatusClass(status) {
      const map = {
        'Booked': 'booked',
        'In Transit': 'in-transit',
        'Delivered': 'delivered',
        'Returned': 'returned',
        'Picked Up': 'picked-up'
      };
      return map[status] || 'booked';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function formatAmount(amount) {
      if (amount == null) return '—';
      return 'Rs. ' + Number(amount).toLocaleString('en-IN');
    }

    function renderPage() {
      const start = (currentPage - 1) * ROWS_PER_PAGE;
      const pageItems = bookings.slice(start, start + ROWS_PER_PAGE);

      if (pageItems.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="7">No bookings found.</td></tr>';
      } else {
        tbody.innerHTML = pageItems.map(b => `
          <tr>
            <td style="font-family: monospace; font-size: 0.8125rem;">${b.userId}</td>
            <td style="font-family: monospace; font-weight: 600;">${b.bookingId}</td>
            <td>${formatDate(b.createdAt)}</td>
            <td>${b.recName}</td>
            <td>${b.recAddress}</td>
            <td>${formatAmount(b.parServiceCost)}</td>
            <td><span class="status-badge ${getStatusClass(b.parStatus)}">${b.parStatus}</span></td>
          </tr>
        `).join('');
      }

      pageInfo.textContent = 'Page ' + currentPage + ' of ' + totalPages;
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= totalPages;
    }

    prevBtn.addEventListener('click', function() {
      if (currentPage > 1) { currentPage--; renderPage(); }
    });

    nextBtn.addEventListener('click', function() {
      if (currentPage < totalPages) { currentPage++; renderPage(); }
    });

    renderPage();
  </script>

</body>
</html>
