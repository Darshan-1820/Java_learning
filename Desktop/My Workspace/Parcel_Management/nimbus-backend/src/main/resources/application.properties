# ========================================
# NIMBUS — Application Configuration
# ========================================

# --- Server ---
server.port=8080

# --- H2 Database (embedded, file-based, data persists across restarts) ---
spring.datasource.url=jdbc:h2:file:./nimbusdb;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- H2 Web Console (visual DB browser at /h2-console) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- SQL Init (runs schema.sql + data.sql on startup) ---
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# --- JSP View Resolver ---
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp
